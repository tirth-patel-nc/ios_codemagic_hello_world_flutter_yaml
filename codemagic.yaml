workflows:
    ios-workflow:
        name: iOS Workflow
        max_build_duration: 120
        instance_type: mac_mini_m4
        integrations:
            app_store_connect: Codemagic Hello World Flutter
        triggering:
            events:                      
                - push

        cache:
            cache_paths:
                - ~/Library/Developer/Xcode/DerivedData/CompilationCache.noindex

        environment:
            flutter: stable
            xcode: 16.2
            ios_signing:
                distribution_type: app_store
                bundle_identifier: com.exam.codemagichelloworldflutter
            vars:
                APP_STORE_APPLE_ID: 6759789849
                BUNDLE_ID: "com.exam.codemagichelloworldflutter" 

        scripts:
            - name: Set up code signing settings on Xcode project
              script: | 
                xcode-project use-profiles --custom-export-options='{"testFlightInternalTestingOnly": true}'  
            - name: Get Flutter packages
              script: | 
                flutter pub get
            - name: Install pods
              script: | 
                find . -name "Podfile" -execdir pod install \;
            - name: Build unsigned .app
              script: |
                xcodebuild -workspace "ios/Runner.xcworkspace" \
                  -scheme "Runner" \
                  -sdk iphonesimulator \
                  -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=18.1' \
                  -configuration Debug \
                  CODE_SIGN_IDENTITY="" \
                  CODE_SIGNING_REQUIRED=NO \
                  CODE_SIGNING_ALLOWED=NO \
                  -derivedDataPath ios/output
        artifacts:
            - build/ios/ipa/*.ipa
            - /tmp/xcodebuild_logs/*.log
            - flutter_drive.log
            - ios/output/Build/Products/Debug-iphonesimulator/Runner.app

        publishing:
            app_store_connect:
                auth: integration
                submit_to_testflight: false
                submit_to_app_store: false
            slack:
                channel: '#codemagic-hello-world-stack'
                notify_on_build_start: false
                notify:
                    success: false
                    failure: false



